<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Em Desenvolvimento</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #f1f5f9;
        }

        .container {
            text-align: center;
            padding: 40px 60px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            backdrop-filter: blur(10px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.4);
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 600;
            letter-spacing: 1px;
        }

        p {
            margin-top: 15px;
            font-size: 1.1rem;
            color: #cbd5e1;
        }

        .status {
            margin-top: 25px;
            font-size: 0.95rem;
            opacity: 0.7;
        }

        @media (max-width: 600px) {
            .container {
                padding: 30px;
            }

            h1 {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🚧 Em Desenvolvimento</h1>
        <p>Estamos trabalhando para trazer algo incrível em breve.</p>
        <div class="status">Volte em breve para conferir as novidades.</div>
    </div>

</body>
</html>
